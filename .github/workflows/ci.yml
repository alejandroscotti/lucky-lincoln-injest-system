name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: rootsecret
          MYSQL_DATABASE: revenue_db
          MYSQL_USER: revenue
          MYSQL_PASSWORD: revenue_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootsecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: revenue_db
      DB_USERNAME: revenue
      DB_PASSWORD: revenue_secret
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, gd, zip, intl
          coverage: none

      - name: Install Laravel dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations and tests
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
          php artisan test

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web
        working-directory: packages/web
        run: npm install && npm run build
